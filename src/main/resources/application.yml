server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:lobsterbox;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        hbm2ddl:
          auto: create
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: lobster-box-secret-key-2026-very-long-secret
  expiration: 86400000

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
