server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:lobsterbox;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

jwt:
  secret: lobster-box-secret-key-2026-very-long-secret
  expiration: 86400000

logging:
  level:
    com.lobsterbox: INFO
    org.springframework: INFO
